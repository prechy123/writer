<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Stories</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Georgia", "Times New Roman", serif;
      background: #f5f0eb;
      color: #2c2c2c;
      min-height: 100vh;
    }

    /* ── Document page wrapper ─────────────────────────────────────── */
    .page {
      max-width: 780px;
      margin: 40px auto;
      background: #fff;
      border: 1px solid #d6d0c8;
      border-radius: 3px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, .08);
      padding: 56px 64px;
      min-height: 80vh;
    }

    @media (max-width: 840px) {
      .page {
        margin: 16px;
        padding: 32px 24px;
      }
    }

    /* ── Typography ────────────────────────────────────────────────── */
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #1a1a1a;
      letter-spacing: -.3px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 36px;
      border-bottom: 1px solid #e8e3dc;
      padding-bottom: 20px;
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1a1a1a;
    }

    h3 {
      font-size: 17px;
      font-weight: 700;
      margin: 28px 0 8px;
      color: #333;
    }

    p,
    li {
      line-height: 1.7;
      font-size: 15px;
    }

    /* ── Status badges ─────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 3px 10px;
      border-radius: 12px;
    }

    .badge-completed {
      background: #e6f4ea;
      color: #1e7e34;
    }

    .badge-running {
      background: #fff3cd;
      color: #856404;
    }

    .badge-pending {
      background: #e8e3dc;
      color: #6c6c6c;
    }

    .badge-failed {
      background: #f8d7da;
      color: #a71d2a;
    }

    /* ── Story list ────────────────────────────────────────────────── */
    .story-list {
      list-style: none;
    }

    .story-list li {
      padding: 16px 0;
      border-bottom: 1px solid #eeebe6;
      cursor: pointer;
      transition: background .15s;
    }

    .story-list li:hover {
      background: #fdfbf8;
      margin: 0 -64px;
      padding: 16px 64px;
    }

    @media (max-width: 840px) {
      .story-list li:hover {
        margin: 0 -24px;
        padding: 16px 24px;
      }
    }

    .story-list li:last-child {
      border-bottom: none;
    }

    .story-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
    }

    .story-title {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .story-meta {
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #999;
      margin-top: 4px;
    }

    /* ── Detail page ───────────────────────────────────────────────── */
    .back-link {
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #7c6f64;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 24px;
    }

    .back-link:hover {
      color: #1a1a1a;
    }

    .detail-header {
      border-bottom: 1px solid #e8e3dc;
      padding-bottom: 20px;
      margin-bottom: 28px;
    }

    .detail-description {
      font-style: italic;
      color: #555;
      margin: 10px 0 12px;
    }

    .detail-meta {
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #999;
    }

    .detail-meta span {
      margin-right: 18px;
    }

    .progress-panel {
      background: #faf8f5;
      border: 1px solid #e8e3dc;
      border-radius: 4px;
      padding: 14px 16px;
      margin: 18px 0 8px;
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    .progress-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      color: #333;
      font-size: 13px;
      font-weight: 600;
    }

    .progress-message {
      color: #666;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 4px;
    }

    .progress-track {
      height: 6px;
      background: #eee7df;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      background: #8a6f55;
      transition: width .3s ease;
    }

    .progress-log {
      margin-top: 10px;
      color: #777;
      font-size: 12px;
      line-height: 1.5;
    }

    .progress-log div {
      margin-top: 3px;
    }

    /* ── Manuscript sections ────────────────────────────────────────── */
    .section {
      margin-bottom: 32px;
    }

    .section-label {
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .chapter {
      margin-bottom: 36px;
    }

    .chapter-heading {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .chapter-title {
      font-size: 17px;
      font-weight: 700;
      color: #1a1a1a;
    }

    .copy-btn {
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #7c6f64;
      background: #f5f0eb;
      border: 1px solid #ddd6cc;
      border-radius: 4px;
      padding: 4px 12px;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 12px;
    }

    .copy-btn:hover {
      background: #ebe4dc;
      color: #1a1a1a;
    }

    .copy-btn.copied {
      background: #e6f4ea;
      color: #1e7e34;
      border-color: #b7dfbf;
    }

    .chapter-body {
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 15px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      list-style: none;
    }

    .tag {
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 12px;
      background: #f0ece6;
      color: #5a5149;
      padding: 3px 10px;
      border-radius: 10px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px 18px;
      margin-top: 8px;
    }

    .meta-item {
      font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 13px;
      line-height: 1.5;
      color: #555;
    }

    .meta-item strong {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #999;
      margin-bottom: 2px;
    }

    .note-body {
      white-space: pre-wrap;
      line-height: 1.75;
      font-size: 14px;
    }

    .character-card {
      background: #faf8f5;
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 14px 18px;
      margin-bottom: 12px;
    }

    .character-card strong {
      font-size: 15px;
    }

    .character-card .role {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #888;
      margin-left: 8px;
    }

    .character-card p {
      margin-top: 6px;
      font-size: 14px;
      color: #555;
    }

    /* ── Utilities ──────────────────────────────────────────────────── */
    .hidden {
      display: none;
    }

    .loading {
      text-align: center;
      padding: 60px 0;
      color: #aaa;
      font-style: italic;
    }

    .error {
      text-align: center;
      padding: 60px 0;
      color: #a71d2a;
    }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: #aaa;
    }

    .divider {
      border: none;
      border-top: 1px solid #e8e3dc;
      margin: 32px 0;
    }
  </style>
</head>

<body>

  <!-- ═══════════════════════════════════════════════════════════════
       PAGE 1  —  Story List
       ═══════════════════════════════════════════════════════════════ -->
  <div id="page-list" class="page">
    <h1>Stories</h1>
    <p class="subtitle">Select a story to read its full details.</p>

    <div id="list-loading" class="loading">Loading stories&hellip;</div>
    <div id="list-error" class="error hidden"></div>
    <div id="list-empty" class="empty hidden">No stories yet.</div>
    <ul id="story-list" class="story-list hidden"></ul>
  </div>

  <!-- ═══════════════════════════════════════════════════════════════
       PAGE 2  —  Story Detail
       ═══════════════════════════════════════════════════════════════ -->
  <div id="page-detail" class="page hidden">
    <a class="back-link" onclick="showList()">&larr; Back to all stories</a>

    <div id="detail-loading" class="loading">Loading story&hellip;</div>
    <div id="detail-error" class="error hidden"></div>
    <div id="detail-content" class="hidden">
      <!-- filled dynamically -->
    </div>
  </div>

  <script>
    const API = "/api";
    let detailPollTimer = null;

    /* ── Helpers ─────────────────────────────────────────────────── */
    function badge(status) {
      const cls = {
        completed: "badge-completed",
        running: "badge-running",
        pending: "badge-pending",
        failed: "badge-failed"
      } [status] || "badge-pending";
      return `<span class="badge ${cls}">${status}</span>`;
    }

    function fmtDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString("en-GB", {
          day: "numeric",
          month: "short",
          year: "numeric"
        }) +
        " " + d.toLocaleTimeString("en-GB", {
          hour: "2-digit",
          minute: "2-digit"
        });
    }

    function hasAny(obj) {
      if (!obj) return false;
      return Object.values(obj).some(v => Array.isArray(v) ? v.length : Boolean(v));
    }

    function tags(items) {
      const clean = (items || []).filter(Boolean);
      if (!clean.length) return "";
      return `<ul class="tag-list" style="margin-top:8px">
        ${clean.map(t => `<li class="tag">${esc(t)}</li>`).join("")}
      </ul>`;
    }

    function bullets(items) {
      const clean = (items || []).filter(Boolean);
      if (!clean.length) return "";
      return `<ul style="padding-left:20px">${clean.map(i => `<li>${esc(i)}</li>`).join("")}</ul>`;
    }

    function clearDetailPoll() {
      if (detailPollTimer) {
        clearTimeout(detailPollTimer);
        detailPollTimer = null;
      }
    }

    function shouldPoll(status) {
      return status === "pending"
        || status === "running"
        || status === "writing"
        || status === "architecting"
        || status === "planning";
    }

    function scheduleDetailPoll(storyId, status, source = "v1") {
      clearDetailPoll();
      if (!shouldPoll(status)) return;
      detailPollTimer = setTimeout(() => {
        loadDetail(storyId, { silent: true }, source);
      }, 5000);
    }

    function renderProgress(s) {
      const progress = s.progress || {};
      if (!hasAny(progress) && !shouldPoll(s.status)) return "";

      const percent = Math.max(0, Math.min(100, Number(progress.percent || 0)));
      const completed = progress.completed_chapters ?? s.chapters_completed ?? 0;
      const total = progress.total_chapters || s.num_chapters || 0;
      const stage = progress.stage ? progress.stage.replace(/_/g, " ") : s.status;
      const message = progress.message || (
        shouldPoll(s.status) ? "Story generation is running." : "No live progress available."
      );
      const updated = progress.updated_at ? `Updated ${fmtDate(progress.updated_at)}` : "";
      const recent = (s.progress_log || []).slice(-4).reverse();

      return `<div class="progress-panel">
        <div class="progress-title">
          <span>${esc(stage)}</span>
          <span>${completed}/${total} chapters</span>
        </div>
        <div class="progress-message">${esc(message)}</div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${percent}%"></div>
        </div>
        <div class="progress-log">
          ${updated ? `<div>${esc(updated)}</div>` : ""}
          ${recent.map(item => `<div>${esc(item.message || item.stage || "")}</div>`).join("")}
        </div>
      </div>`;
    }

    /* ── Navigation ─────────────────────────────────────────────── */
    function showList() {
      clearDetailPoll();
      document.getElementById("page-list").classList.remove("hidden");
      document.getElementById("page-detail").classList.add("hidden");
      history.pushState(null, "", "#");
    }

    function showDetail(storyId, source = "v1") {
      clearDetailPoll();
      document.getElementById("page-list").classList.add("hidden");
      document.getElementById("page-detail").classList.remove("hidden");
      const hashId = source === "v2" ? "v2:" + storyId : storyId;
      history.pushState(null, "", "#story=" + hashId);
      loadDetail(storyId, {}, source);
    }

    /* Parse "#story=<id>" or "#story=v2:<id>" → {storyId, source} or null */
    function parseStoryHash(hash) {
      if (!hash.startsWith("#story=")) return null;
      const raw = hash.slice(7);
      if (raw.startsWith("v2:")) {
        return { storyId: raw.slice(3), source: "v2" };
      }
      return { storyId: raw, source: "v1" };
    }

    /* ── Load story list ────────────────────────────────────────── */
    async function loadList() {
      const $loading = document.getElementById("list-loading");
      const $error = document.getElementById("list-error");
      const $empty = document.getElementById("list-empty");
      const $list = document.getElementById("story-list");

      $loading.classList.remove("hidden");
      $error.classList.add("hidden");
      $empty.classList.add("hidden");
      $list.classList.add("hidden");

      try {
        const [v1Res, v2Res] = await Promise.allSettled([
          fetch(API + "/stories/"),
          fetch("/api/v2/stories/"),
        ]);

        const warnings = [];
        let v1Items = [];
        let v2Items = [];

        if (v1Res.status === "fulfilled" && v1Res.value.ok) {
          const v1Data = await v1Res.value.json();
          v1Items = (Array.isArray(v1Data) ? v1Data : []).map(s => ({ ...s, _source: "v1" }));
        } else {
          warnings.push("v1");
        }

        if (v2Res.status === "fulfilled" && v2Res.value.ok) {
          const v2Data = await v2Res.value.json();
          const v2List = (v2Data && Array.isArray(v2Data.stories)) ? v2Data.stories : [];
          v2Items = v2List.map(s => ({
            story_id: s.story_id,
            title: s.title,
            status: s.status,
            progress: s.progress,
            num_chapters: s.total_chapters ?? s.num_chapters ?? 0,
            created_at: s.created_at,
            updated_at: s.updated_at,
            _source: "v2",
          }));
        } else {
          warnings.push("v2");
        }

        const data = [...v1Items, ...v2Items].sort((a, b) => {
          const at = new Date(a.updated_at || 0).getTime();
          const bt = new Date(b.updated_at || 0).getTime();
          return bt - at;
        });

        $loading.classList.add("hidden");

        if (!data.length) {
          if (warnings.length === 2) {
            $error.textContent = "Failed to load stories from both v1 and v2.";
            $error.classList.remove("hidden");
          } else {
            $empty.classList.remove("hidden");
          }
          return;
        }

        if (warnings.length === 1) {
          $error.textContent = "Note: failed to load " + warnings[0] + " stories. Showing the rest.";
          $error.classList.remove("hidden");
        }

        $list.innerHTML = data.map(s => `
          <li onclick="showDetail('${s.story_id}', '${s._source}')">
            <div class="story-row">
              <span class="story-title">${esc(s.title)}</span>
              ${badge(s.status)}
              ${s._source === "v2" ? '<span class="badge badge-pending" style="margin-left:6px">v2</span>' : ""}
            </div>
            <div class="story-meta">
              ${s.num_chapters} chapter${s.num_chapters===1?"":"s"}
              &middot; Created ${fmtDate(s.created_at)}
              &middot; Updated ${fmtDate(s.updated_at)}
            </div>
            ${s.progress && s.progress.message && shouldPoll(s.status) ? `
              <div class="story-meta">${esc(s.progress.message)}</div>
            ` : ""}
          </li>
        `).join("");
        $list.classList.remove("hidden");
      } catch (err) {
        $loading.classList.add("hidden");
        $error.textContent = "Failed to load stories: " + err.message;
        $error.classList.remove("hidden");
      }
    }

    /* ── Load story detail ──────────────────────────────────────── */
    async function loadDetail(storyId, options = {}, source = "v1") {
      const $loading = document.getElementById("detail-loading");
      const $error = document.getElementById("detail-error");
      const $content = document.getElementById("detail-content");

      if (!options.silent) {
        $loading.classList.remove("hidden");
        $content.classList.add("hidden");
      }
      $error.classList.add("hidden");

      try {
        const url = source === "v2"
          ? "/api/v2/stories/" + storyId + "/"
          : API + "/stories/" + storyId + "/";
        const res = await fetch(url);
        if (!res.ok) throw new Error("Server returned " + res.status);
        const s = await res.json();

        $loading.classList.add("hidden");

        if (source === "v2") {
          $content.innerHTML = renderV2Detail(s);
          $content.classList.remove("hidden");
          scheduleDetailPoll(storyId, s.status, "v2");
          if (!options.silent) {
            window.scrollTo({ top: 0, behavior: "smooth" });
          }
          return;
        }

        let html = "";

        /* ── Header ──────────────────────────────────────────── */
        html += `<div class="detail-header">
          <h2>${esc(s.title)}</h2>
          <p class="detail-description">${esc(s.description)}</p>
          <div class="detail-meta">
            ${badge(s.status)}
            <span>${s.num_chapters} chapter${s.num_chapters===1?"":"s"}</span>
            <span>${s.chapters_completed} completed</span>
            <span>Created ${fmtDate(s.created_at)}</span>
          </div>
        </div>`;

        html += renderProgress(s);

        const ms = s.final_manuscript;

        if (!ms) {
          html += `<p class="empty" style="padding:40px 0">
            ${s.status === "completed" ? "No manuscript data available." :
              s.status === "failed"    ? "Story generation failed." :
              "Story is still being generated&hellip;"}
          </p>`;
        } else {
          const plan = ms.story_plan || {};

          /* ── Overview ─────────────────────────────────────── */
          if (plan.genre || plan.setting || (plan.themes && plan.themes.length)) {
            html += `<div class="section">
              <div class="section-label">Overview</div>`;
            if (plan.genre) html += `<p><strong>Genre:</strong> ${esc(plan.genre)}</p>`;
            if (plan.setting) html += `<p><strong>Setting:</strong> ${esc(plan.setting)}</p>`;
            if (plan.themes && plan.themes.length) {
              html += `<ul class="tag-list" style="margin-top:8px">
                ${plan.themes.map(t => `<li class="tag">${esc(t)}</li>`).join("")}
              </ul>`;
            }
            html += `</div>`;
          }

          /* ── Webnovel strategy ───────────────────────────── */
          const strategy = plan.webnovel_strategy || {};
          if (hasAny(strategy)) {
            html += `<div class="section">
              <div class="section-label">Webnovel Strategy</div>`;

            if (strategy.short_logline) {
              html += `<p><strong>Logline:</strong> ${esc(strategy.short_logline)}</p>`;
            }
            if (strategy.webnovel_synopsis) {
              html += `<p style="margin-top:8px"><strong>Synopsis:</strong> ${esc(strategy.webnovel_synopsis)}</p>`;
            }
            if (strategy.reader_promise) {
              html += `<p style="margin-top:8px"><strong>Reader Promise:</strong> ${esc(strategy.reader_promise)}</p>`;
            }

            const primaryTags = strategy.primary_tags || [];
            const secondaryTags = strategy.secondary_tags || [];
            if (primaryTags.length || secondaryTags.length) {
              html += tags([...primaryTags, ...secondaryTags]);
            }

            html += `<div class="meta-grid">`;
            [
              ["Platform Genre", strategy.platform_genre],
              ["Lead Type", strategy.lead_type],
              ["Target Reader", strategy.target_reader],
              ["Content Rating", strategy.content_rating],
              ["Protagonist Edge", strategy.protagonist_cheat],
              ["Self-Insertion", strategy.self_insertion_anchor],
              ["Update Schedule", strategy.update_schedule],
              ["Stockpile", strategy.stockpile_strategy]
            ].forEach(([label, value]) => {
              if (value) {
                html += `<div class="meta-item"><strong>${esc(label)}</strong>${esc(value)}</div>`;
              }
            });
            html += `</div>`;

            if (strategy.status_ladder && strategy.status_ladder.length) {
              html += `<div style="margin-top:12px"><strong>Status Ladder</strong>${bullets(strategy.status_ladder)}</div>`;
            }
            if (strategy.comparable_hooks && strategy.comparable_hooks.length) {
              html += `<div style="margin-top:12px"><strong>Comparable Hooks</strong>${bullets(strategy.comparable_hooks)}</div>`;
            }
            if (strategy.ranking_strategy && strategy.ranking_strategy.length) {
              html += `<div style="margin-top:12px"><strong>Ranking Strategy</strong>${bullets(strategy.ranking_strategy)}</div>`;
            }
            if (strategy.author_note_templates && strategy.author_note_templates.length) {
              html += `<div style="margin-top:12px"><strong>Author Note Templates</strong>${bullets(strategy.author_note_templates)}</div>`;
            }
            if (strategy.title_variants && strategy.title_variants.length) {
              html += `<div style="margin-top:12px"><strong>Title Variants</strong>${tags(strategy.title_variants)}</div>`;
            }
            if (strategy.cover_prompt) {
              html += `<p style="margin-top:12px"><strong>Cover Prompt:</strong> ${esc(strategy.cover_prompt)}</p>`;
            }
            html += `</div>`;
          }

          /* ── Launch chapter plan ─────────────────────────── */
          const planLaunch = plan.launch_chapter_plan || {};
          const launchPlan = hasAny(planLaunch) ? planLaunch : (ms.launch_chapter_plan || {});
          if (hasAny(launchPlan)) {
            html += `<div class="section">
              <div class="section-label">Launch Chapter Plan</div>`;

            if (launchPlan.conversion_goal) {
              html += `<p><strong>Conversion Goal:</strong> ${esc(launchPlan.conversion_goal)}</p>`;
            }
            if (launchPlan.first_200_words_hook) {
              html += `<p style="margin-top:8px"><strong>First 200 Words:</strong> ${esc(launchPlan.first_200_words_hook)}</p>`;
            }

            html += `<div class="meta-grid">`;
            [
              ["First Line", launchPlan.first_line_strategy],
              ["Scene Pressure", launchPlan.first_scene_pressure],
              ["Protagonist Snapshot", launchPlan.protagonist_snapshot],
              ["Sympathy Trigger", launchPlan.reader_sympathy_trigger],
              ["Special Edge Tease", launchPlan.special_edge_tease],
              ["Stakes Lock", launchPlan.stakes_lock],
              ["Inciting Turn", launchPlan.inciting_turn],
              ["Chapter 1 Reward", launchPlan.chapter_one_progression_reward],
              ["Chapter 1 Cliffhanger", launchPlan.chapter_one_cliffhanger],
              ["Comment Magnet", launchPlan.comment_magnet_question]
            ].forEach(([label, value]) => {
              if (value) {
                html += `<div class="meta-item"><strong>${esc(label)}</strong>${esc(value)}</div>`;
              }
            });
            html += `</div>`;

            if (launchPlan.first_five_chapter_promises && launchPlan.first_five_chapter_promises.length) {
              html += `<div style="margin-top:12px"><strong>First Five Chapter Promises</strong>${bullets(launchPlan.first_five_chapter_promises)}</div>`;
            }
            if (launchPlan.tag_delivery_moments && launchPlan.tag_delivery_moments.length) {
              html += `<div style="margin-top:12px"><strong>Tag Delivery Moments</strong>${bullets(launchPlan.tag_delivery_moments)}</div>`;
            }
            if (launchPlan.early_dropoff_risks && launchPlan.early_dropoff_risks.length) {
              html += `<div style="margin-top:12px"><strong>Early Dropoff Risks</strong>${bullets(launchPlan.early_dropoff_risks)}</div>`;
            }
            if (launchPlan.revision_checklist && launchPlan.revision_checklist.length) {
              html += `<div style="margin-top:12px"><strong>Revision Checklist</strong>${bullets(launchPlan.revision_checklist)}</div>`;
            }
            html += `</div>`;
          }

          /* ── Plot summary ─────────────────────────────────── */
          if (plan.plot_summary) {
            html += `<div class="section">
              <div class="section-label">Plot Summary</div>
              <p>${esc(plan.plot_summary)}</p>
            </div>`;
          }

          /* ── Initial synopsis ─────────────────────────────── */
          if (plan.initial_summary) {
            html += `<div class="section">
              <div class="section-label">Synopsis</div>
              <p>${esc(plan.initial_summary)}</p>
            </div>`;
          }

          /* ── Serial roadmap ──────────────────────────────── */
          if (plan.serial_arcs && plan.serial_arcs.length) {
            html += `<div class="section">
              <div class="section-label">Serial Arcs</div>
              ${plan.serial_arcs.map(arc => `
                <div class="character-card">
                  <strong>Arc ${esc(arc.arc_number)}: ${esc(arc.title)}</strong>
                  ${arc.chapter_range ? `<span class="role">${esc(arc.chapter_range)}</span>` : ""}
                  ${arc.external_goal ? `<p><strong>Goal:</strong> ${esc(arc.external_goal)}</p>` : ""}
                  ${arc.central_conflict ? `<p><strong>Conflict:</strong> ${esc(arc.central_conflict)}</p>` : ""}
                  ${arc.progression_rewards && arc.progression_rewards.length ? `<p><strong>Rewards:</strong> ${arc.progression_rewards.map(r => esc(r)).join(", ")}</p>` : ""}
                  ${arc.major_reversals && arc.major_reversals.length ? `<p><strong>Reversals:</strong> ${arc.major_reversals.map(r => esc(r)).join(", ")}</p>` : ""}
                  ${arc.cliffhanger_bridge ? `<p><strong>Bridge:</strong> ${esc(arc.cliffhanger_bridge)}</p>` : ""}
                </div>
              `).join("")}
            </div>`;
          }

          if ((plan.release_plan && plan.release_plan.length) || (plan.retention_strategy && plan.retention_strategy.length) || plan.long_form_roadmap) {
            html += `<div class="section">
              <div class="section-label">Release & Retention</div>`;
            if (plan.release_plan && plan.release_plan.length) {
              html += `<p><strong>Release Plan</strong></p>${bullets(plan.release_plan)}`;
            }
            if (plan.retention_strategy && plan.retention_strategy.length) {
              html += `<p style="margin-top:10px"><strong>Retention Strategy</strong></p>${bullets(plan.retention_strategy)}`;
            }
            if (plan.long_form_roadmap) {
              html += `<p style="margin-top:10px"><strong>Long-form Roadmap:</strong> ${esc(plan.long_form_roadmap)}</p>`;
            }
            html += `</div>`;
          }

          /* ── Characters ───────────────────────────────────── */
          if (plan.characters && plan.characters.length) {
            html += `<div class="section">
              <div class="section-label">Characters</div>
              ${plan.characters.map(c => `
                <div class="character-card">
                  <strong>${esc(c.name)}</strong><span class="role">${esc(c.role)}</span>
                  <p>${esc(c.description)}</p>
                  ${c.motivations && c.motivations.length ? `<p style="margin-top:4px;font-size:13px;color:#666"><strong>Motivations:</strong> ${c.motivations.map(m => esc(m)).join(", ")}</p>` : ""}
                  ${c.arc ? `<p style="margin-top:4px;font-style:italic;font-size:13px;color:#777">Arc: ${esc(c.arc)}</p>` : ""}
                  ${c.webnovel_role_hook ? `<p style="margin-top:4px;font-size:13px;color:#666"><strong>Webnovel hook:</strong> ${esc(c.webnovel_role_hook)}</p>` : ""}
                  ${c.progression_function ? `<p style="margin-top:4px;font-size:13px;color:#666"><strong>Progression function:</strong> ${esc(c.progression_function)}</p>` : ""}
                </div>
              `).join("")}
            </div>`;
          }

          html += `<hr class="divider">`;

          /* ── Build a lookup for full chapter text from ms.chapters ── */
          const chapterTextMap = {};
          if (ms.chapters && ms.chapters.length) {
            ms.chapters.forEach(ch => {
              if (ch.chapter_number && ch.text) {
                chapterTextMap[ch.chapter_number] = ch.text;
              }
            });
          }

          /* ── Chapters (plan + full text) ──────────────────── */
          const planChapters = (plan.chapters && plan.chapters.length) ? plan.chapters : [];

          if (planChapters.length || Object.keys(chapterTextMap).length) {
            html += `<div class="section"><div class="section-label">Chapters</div>`;

            if (planChapters.length) {
              /* Render from the plan, injecting full text where available */
              planChapters.forEach((ch, idx) => {
                const num = ch.chapter_number;
                const fullText = chapterTextMap[num] || "";
                html += `<div class="chapter">
                  <div class="chapter-heading">
                    <div class="chapter-title">Chapter ${num}: ${esc(ch.title)}</div>
                    ${fullText ? `<button class="copy-btn" onclick="copyChapter(this, ${idx})">Copy</button>` : ""}
                  </div>`;

                if (fullText) {
                  html += `<div class="chapter-body" data-chapter-idx="${idx}">${esc(fullText)}</div>`;
                }

                /* Always show the plan details */
                if (ch.summary) {
                  html += `<div class="section" style="margin-top:16px">
                    <div class="section-label">Summary</div>
                    <p>${esc(ch.summary)}</p>
                  </div>`;
                }
                if (ch.key_events && ch.key_events.length) {
                  html += `<div class="section" style="margin-top:10px">
                    <div class="section-label">Key Events</div>
                    <ul style="padding-left:20px">
                      ${ch.key_events.map(e => `<li>${esc(e)}</li>`).join("")}
                    </ul>
                  </div>`;
                }
                if (ch.characters_involved && ch.characters_involved.length) {
                  html += `<div class="section" style="margin-top:10px">
                    <div class="section-label">Characters Involved</div>
                    <ul class="tag-list">
                      ${ch.characters_involved.map(c => `<li class="tag">${esc(c)}</li>`).join("")}
                    </ul>
                  </div>`;
                }
                if (ch.emotional_arc) {
                  html += `<p style="margin-top:8px;font-style:italic;font-size:13px;color:#888">
                    Emotional arc: ${esc(ch.emotional_arc)}
                  </p>`;
                }
                if (ch.opening_hook || ch.progression_reward || ch.cliffhanger || ch.new_question_raised || ch.reader_emotion_target || ch.filler_risk) {
                  html += `<div class="section" style="margin-top:10px">
                    <div class="section-label">Webnovel Hooks</div>`;
                  if (ch.opening_hook) html += `<p><strong>Opening hook:</strong> ${esc(ch.opening_hook)}</p>`;
                  if (ch.progression_reward) html += `<p><strong>Progression reward:</strong> ${esc(ch.progression_reward)}</p>`;
                  if (ch.new_question_raised) html += `<p><strong>New question:</strong> ${esc(ch.new_question_raised)}</p>`;
                  if (ch.cliffhanger) html += `<p><strong>Cliffhanger:</strong> ${esc(ch.cliffhanger)}</p>`;
                  if (ch.reader_emotion_target) html += `<p><strong>Reader emotion:</strong> ${esc(ch.reader_emotion_target)}</p>`;
                  if (ch.filler_risk) html += `<p><strong>Filler risk:</strong> ${esc(ch.filler_risk)}</p>`;
                  html += `</div>`;
                }
                if (ch.tags_served && ch.tags_served.length) {
                  html += `<div class="section" style="margin-top:10px">
                    <div class="section-label">Tags Served</div>
                    ${tags(ch.tags_served)}
                  </div>`;
                }
                if (ch.comment_prompt || ch.power_stone_pitch) {
                  html += `<div class="section" style="margin-top:10px">
                    <div class="section-label">Reader Interaction</div>`;
                  if (ch.comment_prompt) html += `<p><strong>Comment prompt:</strong> ${esc(ch.comment_prompt)}</p>`;
                  if (ch.power_stone_pitch) html += `<p><strong>Vote prompt:</strong> ${esc(ch.power_stone_pitch)}</p>`;
                  html += `</div>`;
                }
                html += `</div>`;
              });
            } else {
              /* No plan chapters — render from ms.chapters directly */
              ms.chapters.forEach((ch, idx) => {
                html += `<div class="chapter">
                  <div class="chapter-heading">
                    <div class="chapter-title">Chapter ${ch.chapter_number}</div>
                    <button class="copy-btn" onclick="copyChapter(this, ${idx})">Copy</button>
                  </div>
                  <div class="chapter-body" data-chapter-idx="${idx}">${esc(ch.text)}</div>
                </div>`;
              });
            }

            html += `</div>`;
          }

          /* ── Publisher notes ──────────────────────────────── */
          if (ms.publisher_notes) {
            html += `<hr class="divider">
            <div class="section">
              <div class="section-label">Publisher Notes</div>
              <div class="note-body">${esc(ms.publisher_notes)}</div>
            </div>`;
          }

          /* ── Running summary ─────────────────────────────── */
          if (ms.running_summary) {
            html += `<div class="section">
              <div class="section-label">Running Summary</div>
              <p>${esc(ms.running_summary)}</p>
            </div>`;
          }
        }

        $content.innerHTML = html;
        $content.classList.remove("hidden");
        scheduleDetailPoll(storyId, s.status, "v1");
        if (!options.silent) {
          window.scrollTo({
            top: 0,
            behavior: "smooth"
          });
        }
      } catch (err) {
        $loading.classList.add("hidden");
        clearDetailPoll();
        $error.textContent = "Failed to load story: " + err.message;
        $error.classList.remove("hidden");
      }
    }

    /* ── Render v2 reader payload ─────────────────────────────── */
    function renderV2Detail(s) {
      const chapters = Array.isArray(s.chapters) ? s.chapters : [];
      const characters = Array.isArray(s.characters) ? s.characters : [];
      let html = "";

      /* Header */
      html += `<div class="detail-header">
        <h2>${esc(s.title)}</h2>
        <div class="detail-meta">
          ${badge(s.status)}
          <span class="badge badge-pending">v2</span>
          <span>${chapters.length} chapter${chapters.length === 1 ? "" : "s"}</span>
          ${s.created_at ? `<span>Created ${fmtDate(s.created_at)}</span>` : ""}
        </div>
      </div>`;

      html += renderProgress({
        status: s.status,
        progress: s.progress,
        num_chapters: chapters.length,
      });

      /* Characters */
      if (characters.length) {
        html += `<div class="section">
          <div class="section-label">Characters</div>`;
        characters.forEach(c => {
          const metaBits = [];
          if (c.role) metaBits.push(esc(c.role));
          if (c.tier) metaBits.push(esc(c.tier));
          html += `<div class="character-card" style="margin-bottom:14px">
            <p><strong>${esc(c.name || "")}</strong>${metaBits.length ? ` <span style="font-size:13px;color:#888">(${metaBits.join(" · ")})</span>` : ""}</p>
            ${c.short_description ? `<p style="margin-top:4px">${esc(c.short_description)}</p>` : ""}
            ${c.portrait_blurb ? `<p style="margin-top:4px;font-style:italic;font-size:13px;color:#777">${esc(c.portrait_blurb)}</p>` : ""}
          </div>`;
        });
        html += `</div>`;
      }

      /* Chapters */
      if (chapters.length) {
        html += `<hr class="divider">
          <div class="section"><div class="section-label">Chapters</div>`;
        chapters.forEach((ch, idx) => {
          const num = ch.chapter_number ?? (idx + 1);
          const title = ch.title ? `: ${esc(ch.title)}` : "";
          const text = ch.text || "";
          html += `<div class="chapter">
            <div class="chapter-heading">
              <div class="chapter-title">Chapter ${num}${title}</div>
              ${text ? `<button class="copy-btn" onclick="copyChapter(this, ${idx})">Copy</button>` : ""}
            </div>
            ${text ? `<div class="chapter-body" data-chapter-idx="${idx}">${esc(text)}</div>` : ""}
            ${ch.summary ? `<div class="section" style="margin-top:12px">
              <div class="section-label">Summary</div>
              <p>${esc(ch.summary)}</p>
            </div>` : ""}
          </div>`;
        });
        html += `</div>`;
      } else {
        html += `<p class="empty" style="padding:40px 0">
          ${s.status === "completed" ? "No chapters available." :
            s.status === "failed"    ? "Story generation failed." :
            "Story is still being generated&hellip;"}
        </p>`;
      }

      /* Conclusion */
      const conc = s.conclusion;
      if (conc) {
        html += `<hr class="divider">
          <div class="section">
            <div class="section-label">Conclusion</div>`;
        if (conc.closing_chapter_title) {
          html += `<p><strong>Closing chapter:</strong> ${esc(conc.closing_chapter_title)}</p>`;
        }
        if (typeof conc.final_word_count === "number") {
          html += `<p style="margin-top:4px"><strong>Final word count:</strong> ${conc.final_word_count}</p>`;
        }
        if (conc.open_threads_left && conc.open_threads_left.length) {
          html += `<div class="section" style="margin-top:10px">
            <div class="section-label">Open Threads</div>
            ${bullets(conc.open_threads_left)}
          </div>`;
        }
        if (conc.unresolved_cliffhangers && conc.unresolved_cliffhangers.length) {
          html += `<div class="section" style="margin-top:10px">
            <div class="section-label">Unresolved Cliffhangers</div>
            ${bullets(conc.unresolved_cliffhangers)}
          </div>`;
        }
        html += `</div>`;
      }

      return html;
    }

    /* Minimal HTML-escape */
    function esc(str) {
      if (!str) return "";
      const d = document.createElement("div");
      d.textContent = String(str);
      return d.innerHTML;
    }

    /* Copy chapter text to clipboard */
    function copyChapter(btn, idx) {
      const body = document.querySelector(`[data-chapter-idx="${idx}"]`);
      if (!body) return;
      const text = body.textContent;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.classList.remove("copied");
        }, 2000);
      });
    }

    /* ── Boot ────────────────────────────────────────────────────── */
    window.addEventListener("popstate", () => {
      const parsed = parseStoryHash(location.hash);
      if (parsed) {
        document.getElementById("page-list").classList.add("hidden");
        document.getElementById("page-detail").classList.remove("hidden");
        loadDetail(parsed.storyId, {}, parsed.source);
      } else {
        showList();
      }
    });

    (function boot() {
      const parsed = parseStoryHash(location.hash);
      if (parsed) {
        document.getElementById("page-list").classList.add("hidden");
        document.getElementById("page-detail").classList.remove("hidden");
        loadDetail(parsed.storyId, {}, parsed.source);
      }
      loadList();
    })();
  </script>
</body>

</html>
