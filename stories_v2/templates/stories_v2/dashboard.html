<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stories v2</title>
<style>
  /* ── Newspaper-style palette (matches v1 dashboard) ──────────────── */
  :root {
    --bg: #f5f0eb;            /* cream background */
    --bg-2: #faf8f5;          /* pale cream */
    --paper: #ffffff;
    --paper-2: #fdfbf7;
    --border: #d6d0c8;
    --border-soft: #eeebe6;
    --text: #1a1a1a;
    --text-2: #2c2c2c;
    --muted: #7c6f64;
    --muted-2: #999;
    --accent: #8a6f55;        /* warm tan */
    --accent-2: #6d563f;
    --accent-pale: #ebe4dc;
    --ok-bg: #e6f4ea;
    --ok-fg: #1e7e34;
    --warn-bg: #fff3cd;
    --warn-fg: #856404;
    --err-bg: #f8d7da;
    --err-fg: #a71d2a;
    --info-bg: #d9e7f5;
    --info-fg: #1d4e89;
    --serif: Georgia, "Times New Roman", serif;
    --sans: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); min-height: 100vh; }
  body { font-family: var(--serif); font-size: 15px; line-height: 1.7; }
  a { color: var(--accent-2); text-decoration: none; }
  a:hover { color: var(--text); text-decoration: underline; }

  /* ── Buttons ─────────────────────────────────────────────────────── */
  button, .btn {
    font-family: var(--sans);
    font-size: 13px; font-weight: 500;
    color: var(--accent-2);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 14px;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
    text-transform: none;
  }
  button:hover, .btn:hover { background: var(--accent-pale); color: var(--text); border-color: var(--accent); }
  button.primary, .btn.primary {
    background: var(--accent); color: #fff; border-color: var(--accent);
    font-weight: 600;
  }
  button.primary:hover, .btn.primary:hover { background: var(--accent-2); border-color: var(--accent-2); color: #fff; }
  button.danger { background: #fff; border-color: var(--err-bg); color: var(--err-fg); }
  button.danger:hover { background: var(--err-bg); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Inputs ──────────────────────────────────────────────────────── */
  input, textarea, select {
    font-family: var(--sans);
    font-size: 14px;
    color: var(--text);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 10px;
    width: 100%;
    line-height: 1.5;
  }
  textarea { font-family: var(--sans); min-height: 130px; resize: vertical; line-height: 1.6; }
  textarea.tall { min-height: 200px; }
  textarea.xtall { min-height: 300px; }
  input:focus, textarea:focus, select:focus {
    outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(138,111,85,0.12);
  }
  input::placeholder, textarea::placeholder { color: #b8ab9d; font-style: italic; }

  /* ── Header ──────────────────────────────────────────────────────── */
  header {
    background: var(--paper);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex; align-items: center; gap: 24px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }
  header h1 {
    font-family: var(--serif);
    font-size: 22px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--text);
  }
  header nav { display: flex; gap: 4px; margin-left: 8px; font-family: var(--sans); }
  header nav a {
    padding: 6px 14px; border-radius: 4px; color: var(--muted); font-size: 13px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  header nav a:hover { color: var(--text); text-decoration: none; }
  header nav a.active { background: var(--accent-pale); color: var(--accent-2); }
  .spacer { flex: 1; }

  /* ── Main paper layout ──────────────────────────────────────────── */
  main { padding: 40px 16px; max-width: 920px; margin: 0 auto; }
  @media (max-width: 840px) { main { padding: 20px 12px; } }

  h2 {
    font-family: var(--serif);
    font-size: 28px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--text);
    margin-bottom: 8px;
  }
  h3 {
    font-family: var(--serif);
    font-size: 18px; font-weight: 700; color: var(--text);
    margin: 24px 0 10px;
  }
  p { font-size: 15px; line-height: 1.7; color: var(--text-2); }

  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .grid { display: grid; gap: 16px; }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
  .grid-3 { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }

  /* ── Cards = paper sheets ───────────────────────────────────────── */
  .card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 3px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    padding: 24px 28px;
  }
  @media (max-width: 840px) { .card { padding: 20px 18px; } }
  .card.clickable { cursor: pointer; transition: border-color .15s, box-shadow .15s, transform .15s; }
  .card.clickable:hover { border-color: var(--accent); box-shadow: 0 4px 14px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .pick-card { padding: 32px 28px; }
  .pick-card h3 { margin-top: 0; font-size: 20px; }
  .pick-card .pick-tag {
    font-family: var(--sans);
    color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .muted { color: var(--muted); font-size: 13px; font-family: var(--sans); }
  .key { color: var(--muted); font-family: var(--mono); font-size: 11px; }

  /* ── Badges (pale paper tags) ───────────────────────────────────── */
  .badge {
    display: inline-block;
    font-family: var(--sans);
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    padding: 3px 10px; border-radius: 12px;
    background: var(--border-soft); color: var(--muted);
  }
  .badge.pending          { background: var(--border-soft); color: var(--muted); }
  .badge.architecting,
  .badge.planning,
  .badge.writing,
  .badge.running          { background: var(--warn-bg); color: var(--warn-fg); }
  .badge.awaiting_continue{ background: var(--accent-pale); color: var(--accent-2); }
  .badge.completed        { background: var(--ok-bg); color: var(--ok-fg); }
  .badge.failed           { background: var(--err-bg); color: var(--err-fg); }
  .badge.main             { background: var(--accent-pale); color: var(--accent-2); }
  .badge.recurring        { background: var(--info-bg); color: var(--info-fg); }
  .badge.side             { background: var(--border-soft); color: var(--muted); }

  /* ── Progress bar ──────────────────────────────────────────────── */
  .progress { width: 100%; height: 6px; background: var(--border-soft); border-radius: 6px; overflow: hidden; margin-top: 10px; }
  .progress-bar { height: 100%; background: var(--accent); transition: width .3s ease; }

  /* ── Form fields ───────────────────────────────────────────────── */
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-family: var(--sans);
    font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.7px;
    color: var(--muted); margin-bottom: 6px;
  }
  .field .hint {
    font-size: 12px; color: var(--muted); margin-top: 5px; font-style: italic;
    font-family: var(--serif);
  }
  .field-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }

  /* ── Chips (pickers) ───────────────────────────────────────────── */
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 99px;
    background: var(--bg); border: 1px solid var(--border);
    font-family: var(--sans); font-size: 13px; color: var(--text-2);
    cursor: pointer; user-select: none; margin: 2px 4px 2px 0;
    transition: background .15s, border-color .15s;
  }
  .chip:hover { background: var(--accent-pale); border-color: var(--accent); }
  .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Toast ─────────────────────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--paper); border: 1px solid var(--border); border-left-width: 4px;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    padding: 12px 18px; max-width: 380px;
    font-family: var(--sans); font-size: 14px; color: var(--text);
    opacity: 0; transform: translateY(10px);
    transition: opacity .2s, transform .2s;
    pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .toast.ok { border-left-color: var(--ok-fg); }
  .toast.error { border-left-color: var(--err-fg); }

  /* ── Chapter accordion ─────────────────────────────────────────── */
  .chapter {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: 3px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    margin-bottom: 18px; overflow: hidden;
  }
  .chapter-head {
    padding: 18px 24px; cursor: pointer;
    display: flex; align-items: center; gap: 14px;
    border-bottom: 1px solid transparent;
    transition: background .15s;
  }
  .chapter.open .chapter-head { border-bottom-color: var(--border-soft); background: var(--paper-2); }
  .chapter-head:hover { background: var(--bg-2); }
  .chapter-head h3 { margin: 0; flex: 1; font-size: 18px; }
  .chapter-body {
    padding: 24px 32px;
    display: none;
    font-family: var(--serif);
    font-size: 17px; line-height: 1.85;
    color: var(--text-2);
  }
  .chapter.open .chapter-body { display: block; }
  .chapter-body p { margin: 0 0 1.1em; }
  .chapter-body p:first-of-type::first-letter {
    font-size: 3em; font-weight: 700;
    float: left; line-height: 0.9; padding: 4px 8px 0 0;
    color: var(--accent-2);
  }

  /* ── Live events panel ────────────────────────────────────────── */
  .events-panel {
    background: var(--paper);
    border: 1px solid var(--border); border-radius: 3px;
    height: 400px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .events-panel-head {
    padding: 12px 18px; border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 10px;
    font-family: var(--sans); font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--muted);
    background: var(--paper-2);
  }
  .events-list { flex: 1; overflow-y: auto; padding: 10px 18px; font-family: var(--mono); font-size: 12px; }
  .event { margin-bottom: 6px; line-height: 1.5; padding: 4px 0; border-bottom: 1px dashed var(--border-soft); }
  .event:last-child { border-bottom: none; }
  .event .ts { color: var(--muted); margin-right: 10px; }
  .event .type { color: var(--accent-2); margin-right: 10px; font-weight: 600; }
  .event .payload { color: var(--text-2); }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); display: inline-block; }
  .dot.live { background: var(--ok-fg); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* ── Tabs ──────────────────────────────────────────────────────── */
  .tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
    font-family: var(--sans);
  }
  .tab {
    padding: 12px 18px; cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    font-size: 13px; font-weight: 500;
    text-transform: uppercase; letter-spacing: 0.6px;
    transition: color .15s, border-color .15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent-2); border-bottom-color: var(--accent); }

  /* ── Misc ──────────────────────────────────────────────────────── */
  pre {
    font-family: var(--mono); font-size: 12px;
    background: var(--bg-2); border: 1px solid var(--border-soft);
    border-radius: 4px; padding: 14px;
    overflow-x: auto; white-space: pre-wrap; word-break: break-word;
    color: var(--text-2);
  }
  .character-card .name { font-weight: 700; font-size: 15px; }
  .character-card .role { color: var(--muted); font-size: 13px; font-family: var(--sans); }
  .character-card .desc { font-size: 14px; line-height: 1.6; color: var(--text-2); margin-top: 4px; }
  .breadcrumb {
    font-family: var(--sans);
    font-size: 12px;
    color: var(--muted); margin-bottom: 16px;
    text-transform: uppercase; letter-spacing: 0.6px;
  }
  .breadcrumb a { color: var(--muted); }
  .breadcrumb a:hover { color: var(--text); }

  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(60, 50, 40, 0.5); backdrop-filter: blur(2px);
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal {
    background: var(--paper);
    border: 1px solid var(--border); border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    padding: 28px;
    max-width: 720px; width: 100%;
    max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { margin-top: 0; }

  .scene-card {
    background: var(--paper);
    border: 1px solid var(--border); border-radius: 3px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.03);
    padding: 16px 20px; margin-bottom: 12px;
  }
  .scene-card .scene-head {
    display: flex; gap: 12px; align-items: center; margin-bottom: 8px;
    font-family: var(--sans); font-size: 13px;
  }
  .scene-prose { font-family: var(--serif); font-size: 15px; line-height: 1.85; color: var(--text-2); white-space: pre-wrap; padding: 8px 0; }
  .findings { font-family: var(--sans); font-size: 12px; }
  .finding { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px dashed var(--border-soft); }
  .sev-warn  { color: var(--warn-fg); font-weight: 600; }
  .sev-error { color: var(--err-fg);  font-weight: 600; }
  .sev-info  { color: var(--info-fg); font-weight: 600; }

  details { margin-top: 8px; }
  summary { cursor: pointer; font-family: var(--sans); font-size: 12px; color: var(--muted); }
  summary:hover { color: var(--text); }

  /* ── Tooltip system ────────────────────────────────────────────── */
  .tip-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 15px; height: 15px; border-radius: 50%;
    background: var(--accent-pale); color: var(--accent-2);
    font-family: var(--sans);
    font-size: 10px; font-weight: 700;
    margin-left: 6px; cursor: help; user-select: none;
    border: 1px solid var(--border); vertical-align: middle;
    transition: background .15s, color .15s, border-color .15s;
  }
  .tip-icon:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .has-tip { position: relative; cursor: help; }
  .has-tip[data-tip]:hover::after,
  .tip-icon[data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--paper);
    border: 1px solid var(--accent);
    box-shadow: 0 4px 14px rgba(0,0,0,0.12);
    padding: 10px 14px;
    border-radius: 4px;
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 400;
    color: var(--text-2);
    width: 300px; max-width: 90vw;
    white-space: normal; text-align: left;
    line-height: 1.55;
    z-index: 300;
    pointer-events: none;
    letter-spacing: 0; text-transform: none;
  }
  .has-tip[data-tip]:hover::before,
  .tip-icon[data-tip]:hover::before {
    content: '';
    position: absolute;
    bottom: calc(100% + 2px);
    left: 50%;
    transform: translateX(-50%);
    border: 6px solid transparent;
    border-top-color: var(--accent);
    z-index: 301;
    pointer-events: none;
  }
  .tip-below[data-tip]:hover::after { bottom: auto; top: calc(100% + 8px); }
  .tip-below[data-tip]:hover::before { bottom: auto; top: calc(100% + 2px); border-top-color: transparent; border-bottom-color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>Stories v2</h1>
  <nav>
    <a href="#/stories" data-nav="stories">Stories</a>
    <a href="#/profiles" data-nav="profiles">Profiles</a>
  </nav>
  <div class="spacer"></div>
  <a class="btn primary" href="#/stories/new">+ New Story</a>
</header>

<main id="app"></main>
<div id="toast" class="toast"></div>

<script>
/* ============================================================
 * stories_v2 single-page UI
 * ============================================================ */

const API = '/api/v2';
const app = document.getElementById('app');
const toastEl = document.getElementById('toast');

// ---- Toast --------------------------------------------------
let toastTimer;
function toast(message, type = 'ok') {
  toastEl.className = `toast ${type} show`;
  toastEl.textContent = message;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 3000);
}

// ---- API helper --------------------------------------------
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(`${API}${path}`, opts);
  let data = null;
  try { data = await res.json(); } catch {}
  if (!res.ok) {
    const msg = (data && (data.detail || data.error)) || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  return data;
}

// ---- Helpers -----------------------------------------------
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const fmtDate = s => { if (!s) return ''; try { return new Date(s).toLocaleString(); } catch { return s; } };
function setActiveNav(name) { document.querySelectorAll('header nav a').forEach(a => a.classList.toggle('active', a.dataset.nav === name)); }
const STATUS_LABELS = { pending: 'Queued', architecting: 'Architecting', planning: 'Planning', writing: 'Writing', running: 'Running', awaiting_continue: 'Awaiting continue', completed: 'Completed', failed: 'Failed' };

/* ============================================================
 * Tooltips — explanations for every input and output
 * ============================================================ */
const TOOLTIPS = {
  // --- Story basics ---
  title: "The book's working title. Shown to readers on the story page.",
  premise: "2-4 sentence pitch. The Architect uses this as the seed for the macro 4-act arc plan. Specific premises (named character + concrete stakes) produce far better stories than vague ones.",
  numChapters: "Total chapters the engine plans. The Architect divides them across 4 acts (~25% discovery, 35% escalation, 25% revelation, 15% catharsis). You don't have to write them all now — see 'Initial batch'.",
  initialBatch: "How many chapters to write right now. The rest stay queued; you click 'Continue' on the story page to write more. Smaller batches = faster feedback, cheaper retries.",
  targetWords: "Soft target per chapter (no hard floor). The Pacing critic flags 'rushed' or 'padded' if a scene drifts more than ±30% from this number, but the engine never auto-pads to hit a quota.",
  pov: "First: 'I walked.' Third limited: 'Mara walked.' (web-novel default) Third omniscient: narrator floats. Multi-POV: each scene assigns its own POV character — best for ensemble stories.",
  tense: "Past tense is the web-novel norm and what most readers expect. Present tense gives a more immediate, breathless feel but is harder to sustain across long books.",
  genres: "Picks the technique exemplars + arc-shape conventions. Multi-select. Affects everything downstream — milestone density, magic-system requirements, pacing defaults.",
  tone: "Emotional baseline. The Empath uses this to seed reader-emotion targets per scene (e.g. 'cathartic' tilts the catharsis act toward joy + relief vectors).",
  profileId: "Optional reusable author-voice fingerprint. If set, the Scene Writer bakes your voice into the NARRATIVE voice — not into character dialogue (each character keeps their own voice).",

  // --- Quick characters ---
  charName: "Required. Used as the character_id reference in milestones, scene beats, and relationships.",
  charRole: "Short label: protagonist, mentor, rival, mother, stableman... Helps the Architect place this character in the macro arc.",
  charTrait: "One vivid trait. The richer this is, the less generic Character Forge will be when filling in motivations + arc + voice.",
  charSampleLine: "A verbatim line this character could plausibly say. Used as a few-shot anchor whenever the Scene Writer drafts their dialogue. This is the single highest-leverage character field.",

  // --- Deep characters ---
  charTier: "Main = POV-eligible, full voice fingerprint + mood vectors tracked every scene (5-8 sample lines recommended). Recurring = appears in 3+ chapters, voice fingerprint + mood tracking when present (3-5 sample lines). Side = 1-2 appearances, lightweight stub, no mood tracking.",
  charAge: "Any format: '17', 'mid-thirties', 'ancient', '?'. The Continuity refresher ages characters across long timelines.",
  charPronouns: "How the narrator refers to this character. Free-form: he/him, she/her, they/them, xe/xem, etc.",
  charBackground: "2-4 sentences of formative history. Anchors motivations + voice. Specific beats ('lost her father at 16 to silicosis') beat generic claims ('had a hard childhood').",
  charMotivations: "What they want, in priority order. One per line. The Architect weaves these into the arc plan and scene goals.",
  charFears: "What they avoid or run from. Drives the Goal-Conflict-Disaster engine on scenes they appear in.",
  charArc: "How this character changes by the end. The Architect plots delivery of this change against the macro arc.",
  charSpeechTraits: "Formality, dialect markers, sentence-length tendency, idioms. Used by the voice extractor when sample_lines is empty — but sample lines beat description.",
  charSampleLines: "5-8 verbatim lines for main, 3-5 for recurring. These are the strongest few-shot anchors in the system. If you only fill ONE voice field, fill this one.",
  charBannedPhrases: "Phrases this character would NEVER say. The Voice critic flags any draft that puts these in their mouth and the Editor rewrites them.",
  charPortrait: "1-2 sentences shown to readers on the story page. Visual + vibe, not biography.",

  // --- World ---
  worldSetting: "One paragraph: time, place, scale, mood. The Scene Writer treats this as the anchor every scene must respect. Don't be generic.",
  worldTimePeriod: "Specific: '1894-1895', 'late Tang dynasty', '200 years after the Severance'.",

function tip(key) {
  const text = TOOLTIPS[key];
  if (!text) return '';
  return ` <span class="tip-icon" data-tip="${esc(text)}">?</span>`;
}
function tipAttr(key) {
  const text = TOOLTIPS[key];
  if (!text) return '';
  return `data-tip="${esc(text)}"`;
}
const PROGRESSION_GENRES = [
  { v: 'progression_fantasy', label: 'Progression fantasy' },
  { v: 'cultivation', label: 'Cultivation / Wuxia' },
  { v: 'litrpg', label: 'LitRPG' },
  { v: 'isekai', label: 'Isekai' },
  { v: 'light_novel', label: 'Light novel' },
  { v: 'romance', label: 'Romance' },
  { v: 'literary', label: 'Literary' },
  { v: 'slice_of_life', label: 'Slice of life' },
  { v: 'urban_fantasy', label: 'Urban fantasy' },
  { v: 'sci_fi', label: 'Sci-fi' },
];
const TONE_CHIPS = ['gritty', 'hopeful', 'dry_funny', 'tragic', 'cathartic', 'wholesome', 'dark', 'whimsical', 'bittersweet'];

function chipGroup(name, values, selected, multi = true) {
  return values.map(v => {
    const val = typeof v === 'string' ? v : v.v;
    const label = typeof v === 'string' ? v.replace(/_/g, ' ') : v.label;
    const active = selected.includes(val);
    return `<span class="chip ${active ? 'active' : ''}" data-chip-group="${name}" data-chip-val="${val}" data-multi="${multi}">${esc(label)}</span>`;
  }).join('');
}

function wireChips(rootEl, state) {
  rootEl.querySelectorAll('[data-chip-group]').forEach(chip => {
    chip.addEventListener('click', () => {
      const group = chip.dataset.chipGroup;
      const val = chip.dataset.chipVal;
      const multi = chip.dataset.multi === 'true';
      if (!Array.isArray(state[group])) state[group] = [];
      if (multi) {
        const idx = state[group].indexOf(val);
        if (idx >= 0) state[group].splice(idx, 1); else state[group].push(val);
        chip.classList.toggle('active');
      } else {
        state[group] = [val];
        rootEl.querySelectorAll(`[data-chip-group="${group}"]`).forEach(c => c.classList.toggle('active', c.dataset.chipVal === val));
      }
    });
  });
}

const ROUTES = [
  { path: /^#?\/?$/, handler: showStoriesList },
  { path: /^#\/stories\/?$/, handler: showStoriesList },
  { path: /^#\/stories\/new\/?$/, handler: showStoryPicker },
  { path: /^#\/stories\/new\/quick\/?$/, handler: showQuickWizard },
  { path: /^#\/stories\/new\/deep\/?$/, handler: showDeepWizard },
  { path: /^#\/stories\/new\/paste\/?$/, handler: showPasteWizard },
  { path: /^#\/stories\/new\/import\/?$/, handler: showImportWizard },
  { path: /^#\/stories\/([^/]+)\/bibles\/?$/, handler: (m) => showBibleReview(m[1]) },
  { path: /^#\/stories\/([^/]+)\/?$/, handler: (m) => showStoryDetail(m[1]) },
  { path: /^#\/stories\/([^/]+)\/skeleton\/?$/, handler: (m) => showSkeleton(m[1]) },
  { path: /^#\/profiles\/?$/, handler: showProfilesList },
  { path: /^#\/profiles\/new\/?$/, handler: showProfileNew },
  { path: /^#\/profiles\/([^/]+)\/?$/, handler: (m) => showProfileDetail(m[1]) },
];

function route() {
  const hash = window.location.hash || '#/stories';
  for (const r of ROUTES) {
    const m = hash.match(r.path);
    if (m) { r.handler(m); return; }
  }
  app.innerHTML = `<div class="card">Unknown route: ${esc(hash)}</div>`;
}

window.addEventListener('hashchange', route);

      <div class="field"><label>Must-have vibes${tip('worldVibes')}</label><textarea id="w-vibes" placeholder="lantern-lit alleys&#10;coal smoke&#10;frozen pump handles&#10;incense haze on temple steps&#10;salt wind off the docks&#10;the click of an unlit oil lamp cooling"></textarea></div>

    <div class="card" style="margin-top:14px">

      <div class="field-row">

        <div class="field"><label>Pacing speed${tip('arcPacing')}</label><select id="a-pacing"><option>slow_burn</option><option selected>balanced</option><option>breakneck</option></select></div>
        <div class="field"><label>Romance temperature${tip('arcRomance')}</label><select id="a-rom"><option>none</option><option selected>subtext</option><option>warm</option><option>spicy</option></select></div>

      <div class="field"><label>Must-avoid tropes${tip('arcAvoid')}</label><textarea id="a-avoid" placeholder="love triangle&#10;amnesia&#10;fridged girlfriend&#10;chosen one prophecy&#10;'and it was all a dream'"></textarea></div>
      <div class="field"><label>Progression milestones${tip('arcMile')}</label><textarea id="a-mile" class="tall" placeholder="MC breaks through Body Tempering in chapter 3&#10;MC defeats the rival sect heir in a public duel by chapter 7&#10;MC inherits the master's sword in chapter 10&#10;MC opens her first inner gate in chapter 14&#10;MC kills the sect elder who betrayed her father in chapter 19"></textarea></div>

    </div>

    <div class="card" style="margin-top:14px">
      <h3>Style anchors (optional)</h3>
      <div class="field"><label>Reference authors${tip('styleAuth')}</label><textarea id="s-auth" placeholder="Annie Proulx&#10;Cormac McCarthy&#10;Reki Kawahara"></textarea></div>
      <div class="field"><label>Reference books${tip('styleBooks')}</label><textarea id="s-books" placeholder="Close Range&#10;Blood Meridian&#10;Cradle"></textarea></div>
      <div class="field"><label>Pasted sample passages${tip('stylePassages')}</label><textarea id="s-passages" class="xtall" placeholder="Paste 2-5 passages from your own writing or from public-domain text whose VIBE matches what you want. Separate each passage with a blank line.&#10;&#10;Example:&#10;&#10;She found the room by smell first. Cold metal. Something older underneath. Like rust soaked through paper and left to dry on a windowsill. The door was not locked. It had been, once, and someone had peeled the lock out with a small tool.&#10;&#10;He sat cross-legged on the stone and breathed. The mountain breathed back, slow and indifferent. Beneath the courtyard, beneath the foundation, beneath the roots of the old plum tree, something turned. He could not have said what."></textarea></div>
    </div>

    <div class="row" style="margin-top:18px">
      <button id="d-submit" class="primary">Create story</button>
    </div>
  `;
  wireChips(app, state.quick);

  // Render characters
  const charList = document.getElementById('d-chars');
  function drawChars() {
    charList.innerHTML = state.characters.map((c, i) => `
      <div class="card" style="padding:18px">
        <div class="field-row">
          <div class="field" style="margin:0"><label>Name *${tip('charName')}</label><input data-i="${i}" data-k="name" placeholder="Mara Holt" value="${esc(c.name)}" /></div>
          <div class="field" style="margin:0"><label>Tier${tip('charTier')}</label><select data-i="${i}" data-k="tier">
            <option value="main" ${c.tier === 'main' ? 'selected' : ''}>Main (POV-eligible)</option>
            <option value="recurring" ${c.tier === 'recurring' ? 'selected' : ''}>Recurring</option>
            <option value="side" ${c.tier === 'side' ? 'selected' : ''}>Side</option>
          </select></div>
          <div class="field" style="margin:0"><label>Role${tip('charRole')}</label><input data-i="${i}" data-k="role" placeholder="protagonist, mentor..." value="${esc(c.role || '')}" /></div>
        </div>
        <div class="field-row" style="margin-top:8px">
          <div class="field" style="margin:0"><label>Age${tip('charAge')}</label><input data-i="${i}" data-k="age" placeholder="17, mid-thirties..." value="${esc(c.age || '')}" /></div>
          <div class="field" style="margin:0"><label>Pronouns${tip('charPronouns')}</label><input data-i="${i}" data-k="pronouns" placeholder="she/her, he/him, they/them" value="${esc(c.pronouns || '')}" /></div>
        </div>
        <div class="field" style="margin-top:8px"><label>Background${tip('charBackground')}</label><textarea data-i="${i}" data-k="background" placeholder="Trained in Boston, returned home after her father died of silicosis at the mine. Has not slept properly in three weeks. Carries a 1882 Webley revolver she has never fired.">${esc(c.background || '')}</textarea></div>
        <div class="field"><label>Motivations (one per line)${tip('charMotivations')}</label><textarea data-i="${i}" data-k="motivations_text" placeholder="Keep everyone alive through winter&#10;Find out who poisoned the well&#10;Hold the town together until thaw">${(c.motivations || []).join('\n')}</textarea></div>
        <div class="field"><label>Fears (one per line)${tip('charFears')}</label><textarea data-i="${i}" data-k="fears_text" placeholder="Losing another patient she could have saved&#10;Becoming her mother&#10;Being seen crying">${(c.fears || []).join('\n')}</textarea></div>
        <div class="field"><label>Arc${tip('charArc')}</label><textarea data-i="${i}" data-k="arc" placeholder="Learns to ask for help. By chapter 15 she lets Sam carry the kit. By chapter 22 she tells Father Brennan the truth about the well.">${esc(c.arc || '')}</textarea></div>
        <div class="field"><label>Speech traits${tip('charSpeechTraits')}</label><input data-i="${i}" data-k="speech_traits" placeholder="short sentences, dry humour, never names emotions, says 'I'd say' before any judgement" value="${esc(c.speech_traits || '')}" /></div>
        <div class="field"><label>Sample lines${tip('charSampleLines')}</label><textarea data-i="${i}" data-k="sample_lines_text" class="tall" placeholder="I'd say you've got about an hour.&#10;Look. Sit down. Drink that.&#10;That is not what I said and you know it.&#10;He's lying. I've watched him lie since we were twelve.&#10;Don't.&#10;If you came here to apologise, you're wasting both our time.">${(c.sample_lines || []).join('\n')}</textarea></div>
        <div class="field"><label>Banned phrases${tip('charBannedPhrases')}</label><textarea data-i="${i}" data-k="banned_text" placeholder="delve&#10;unwavering&#10;I shall&#10;perhaps">${(c.banned_phrases || []).join('\n')}</textarea></div>
        <button data-rm="${i}">Remove</button>
      </div>
    `).join('');
    charList.querySelectorAll('[data-i]').forEach(el => {
      el.addEventListener('input', () => {

        if (k.endsWith('_text')) {
          const target = k.replace('_text', '');
          state.characters[i][target === 'banned' ? 'banned_phrases' : target === 'sample_lines' ? 'sample_lines' : target] = el.value.split('\n').map(s => s.trim()).filter(Boolean);
        } else {
          state.characters[i][k] = el.value;
        }
      });
    });
    charList.querySelectorAll('[data-rm]').forEach(b => b.addEventListener('click', () => { state.characters.splice(+b.dataset.rm, 1); drawChars(); }));
  }
  document.getElementById('d-add-char').addEventListener('click', () => {
    state.characters.push({ name: '', tier: state.characters.length === 0 ? 'main' : 'recurring', role: '', background: '', motivations: [], fears: [], secrets: [], arc: '', knowledge_sources: [], relationships: [], speech_traits: '', preferred_phrases: [], banned_phrases: [], sample_lines: [] });

  });
  drawChars();

  api('GET', '/profiles/').then(d => {
    const sel = document.getElementById('d-profile');
    (d.profiles || []).forEach(p => {
      const o = document.createElement('option'); o.value = p.mongo_id || p.profile_id; o.textContent = p.name;
      sel.appendChild(o);
    });
  }).catch(() => {});

  document.getElementById('d-submit').addEventListener('click', async () => {
    state.quick.title = document.getElementById('d-title').value.trim();
    state.quick.premise = document.getElementById('d-premise').value.trim();
    state.quick.num_chapters = +document.getElementById('d-num').value;
    state.quick.initial_chapters = +document.getElementById('d-init').value;
    state.quick.target_chapter_words = +document.getElementById('d-words').value;
    state.quick.pov = document.getElementById('d-pov').value;
    state.quick.tense = document.getElementById('d-tense').value;
    state.quick.profile_id = document.getElementById('d-profile').value || null;
    state.quick.characters = []; // Deep uses its own characters list

    state.world.setting = document.getElementById('w-setting').value.trim();
    state.world.time_period = document.getElementById('w-time').value.trim();
    state.world.technology_level = document.getElementById('w-tech').value.trim();
    state.world.social_structure = document.getElementById('w-social').value.trim();
    state.world.geography = document.getElementById('w-geo').value.trim();
    state.world.magic_or_system.kind = document.getElementById('w-magic-kind').value;
    state.world.magic_or_system.description = document.getElementById('w-magic-desc').value.trim();
    state.world.magic_or_system.progression_path = document.getElementById('w-prog').value.split('\n').map(s => s.trim()).filter(Boolean);
    state.world.banned_anachronisms = document.getElementById('w-anach').value.split('\n').map(s => s.trim()).filter(Boolean);
    state.world.must_have_vibes = document.getElementById('w-vibes').value.split('\n').map(s => s.trim()).filter(Boolean);

    state.arc_preferences.cliffhanger_intensity = document.getElementById('a-cliff').value;
    state.arc_preferences.pacing_speed = document.getElementById('a-pacing').value;
    state.arc_preferences.romance_temperature = document.getElementById('a-rom').value;
    state.arc_preferences.action_density = document.getElementById('a-action').value;
    state.arc_preferences.must_include_tropes = document.getElementById('a-incl').value.split('\n').map(s => s.trim()).filter(Boolean);
    state.arc_preferences.must_avoid_tropes = document.getElementById('a-avoid').value.split('\n').map(s => s.trim()).filter(Boolean);
    state.arc_preferences.progression_milestones = document.getElementById('a-mile').value.split('\n').map(s => s.trim()).filter(Boolean);
    state.arc_preferences.reader_emotional_journey = document.getElementById('a-emo').value.trim();

    state.style_anchors.reference_authors = document.getElementById('s-auth').value.split('\n').map(s => s.trim()).filter(Boolean);
    state.style_anchors.reference_books = document.getElementById('s-books').value.split('\n').map(s => s.trim()).filter(Boolean);
    state.style_anchors.pasted_sample_passages = document.getElementById('s-passages').value.split('\n\n').map(s => s.trim()).filter(Boolean);

    if (!state.quick.title) return toast('Title is required.', 'error');
    if (!state.quick.premise || state.quick.premise.length < 10) return toast('Premise must be at least 10 characters.', 'error');

    try {
      toast('Building bibles...');
      const r = await api('POST', '/stories/deep/', state);
      window.location.hash = `#/stories/${r.story_id}/bibles`;
    } catch (e) { toast(e.message, 'error'); }
  });
}

function showPasteWizard() {
  setActiveNav('stories');
  app.innerHTML = `
    <div class="breadcrumb"><a href="#/stories">Stories</a> · <a href="#/stories/new">New</a> · Paste</div>

        <textarea id="p-text" class="xtall" style="min-height:380px" placeholder="Mara Holt is a forty-year-old doctor who returned to her frontier hometown after her father died of silicosis. She is stubborn and uses dry humour. The story takes place in 1894-1895 during a record-breaking winter that cuts the town off from the rail line for three months.&#10;&#10;Antagonist: Sheriff Owen Pell, who hides a smallpox case in the saloon because the saloon owner is his cousin. Mara discovers the cover-up in chapter 4.&#10;&#10;Recurring characters: Sam Pell (stableman, the sheriff's brother, secretly Mara's only ally); Father Brennan (Methodist preacher, dying of TB, knows everyone's secrets); Hannah Voss (15, the town's telegraph operator, the only link to the world outside).&#10;&#10;World rules: rail line buried Nov-March. One doctor, one nurse, one mortician (Hannah's father). No antibiotics. No telegraph if the wires go down. The mine is closed but the company still owns the land.&#10;&#10;Tone: gritty, eventually hopeful. Slow burn pacing. Subtext romance with Sam — no on-page intimacy.&#10;&#10;Must include: the long winter, deathbed promise, rival becomes ally.&#10;Must avoid: love triangle, amnesia, supernatural elements."></textarea>
        <div class="hint">At least 20 characters. The parser uses an LLM to extract structured fields (premise, characters, world rules, arc preferences) and pre-fills the Deep wizard for you to review.</div>
      </div>
      <div class="field">
        <label>Hint (optional)${tip('pasteHint')}</label>
        <input id="p-hint" placeholder="e.g. 'this is a character bible' or 'sample chapter, third-limited POV'" />
        <div class="hint">Helps the parser weight what it's looking at. Skip if the text speaks for itself.</div>
      </div>
      <div class="row">
        <button id="p-parse" class="primary">Parse</button>
      </div>
    </div>
    <div id="p-result" style="margin-top:18px"></div>
  `;
  document.getElementById('p-parse').addEventListener('click', async () => {
    const raw = document.getElementById('p-text').value;
    const hint = document.getElementById('p-hint').value.trim();
    if (!raw || raw.length < 20) return toast('Need at least 20 characters of text.', 'error');
    try {
      toast('Parsing...');
      const r = await api('POST', '/stories/parse/', { raw_text: raw, hint: hint || undefined });
      const draft = r.draft || {};
      const result = document.getElementById('p-result');
      result.innerHTML = `
        <div class="card">
          <h3>Parsed draft</h3>
          <div class="muted" style="margin-bottom:10px">Review what we extracted. Then either submit as a Deep story directly, or take notes and re-enter via the Deep wizard.</div>
          ${(draft.notes || []).length ? `<div class="card" style="background:var(--bg-2);margin-bottom:10px"><strong>Parser notes:</strong><ul>${draft.notes.map(n => `<li>${esc(n)}</li>`).join('')}</ul></div>` : ''}
          <pre>${esc(JSON.stringify(draft, null, 2))}</pre>
          <div class="row" style="margin-top:14px">
            <button id="p-submit" class="primary">Submit as Deep story</button>
            <a class="btn" href="#/stories/new/deep">Open Deep wizard to edit first</a>
          </div>
        </div>
      `;
      document.getElementById('p-submit').addEventListener('click', async () => {
        try {
          const payload = {
            quick: draft.quick || { title: '(pasted draft)', premise: raw.slice(0, 200), num_chapters: 10 },
            characters: draft.characters || [],
            world: draft.world || {},
            arc_preferences: draft.arc_preferences || {},
            style_anchors: draft.style_anchors || {},
          };
          const out = await api('POST', '/stories/deep/', payload);
          window.location.hash = `#/stories/${out.story_id}/bibles`;
        } catch (e) { toast(e.message, 'error'); }
      });
    } catch (e) { toast(e.message, 'error'); }
  });
}

// ---- Shared: profile <select> helper -----------------------
async function populateProfileSelect(selectEl, currentId) {
  if (!selectEl) return;
  selectEl.innerHTML = '<option value="">— select a profile —</option>';
  try {
    const data = await api('GET', '/profiles/');
    for (const p of (data.profiles || [])) {
      const id = p.mongo_id || p.profile_id;
      if (!id) continue;
      const opt = document.createElement('option');
      opt.value = id;
      opt.textContent = p.name || id;
      if (currentId && id === currentId) opt.selected = true;
      selectEl.appendChild(opt);
    }
  } catch (e) { /* leave empty — caller will see no options */ }
}

// ---- Import-past-chapters wizard ----------------------------
const IMPORT_DRAFT_KEY = 'v2-import-draft';
const IMPORT_DRAFT_VERSION = 1;

function _importDefaultState() {
  return {
    version: IMPORT_DRAFT_VERSION,
    title: '',
    chapters: [{ title: '', text: '' }],
    description: '',
    chapters_to_generate: 3,
    end_story: false,
    profile_mode: 'generate',     // 'select' | 'generate'
    profile_id: '',
    new_profile_name: '',
    new_profile_bio: '',
    saved_at: null,
  };
}

function _loadImportDraft() {
  try {
    const raw = localStorage.getItem(IMPORT_DRAFT_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || parsed.version !== IMPORT_DRAFT_VERSION) return null;
    if (!Array.isArray(parsed.chapters) || !parsed.chapters.length) return null;
    return parsed;
  } catch (e) { return null; }
}

function _saveImportDraft(state) {
  try {
    state.saved_at = new Date().toISOString();
    localStorage.setItem(IMPORT_DRAFT_KEY, JSON.stringify(state));
  } catch (e) { /* quota or disabled — silently ignore */ }
}

function _clearImportDraft() {
  try { localStorage.removeItem(IMPORT_DRAFT_KEY); } catch (e) {}
}

        <div class="field" style="margin-top:8px">
          <label>Title (optional)</label>
          <input class="i-ch-title" data-idx="${i}" value="${esc(c.title || '')}" placeholder="Chapter ${i + 1}" />
        </div>
        <div class="field">
          <label>Text *</label>
          <textarea class="i-ch-text" data-idx="${i}" style="min-height:220px" placeholder="Paste the chapter prose here.">${esc(c.text || '')}</textarea>
          <div class="hint">${(c.text || '').length} chars · min 50</div>
        </div>
      </div>
    `).join('');
    chCount.textContent = `${state.chapters.length} chapter${state.chapters.length === 1 ? '' : 's'}`;
    chList.querySelectorAll('.i-ch-title').forEach(el => el.addEventListener('input', e => {
      state.chapters[parseInt(e.target.dataset.idx, 10)].title = e.target.value;
      scheduleSave();
    }));
    chList.querySelectorAll('.i-ch-text').forEach(el => el.addEventListener('input', e => {
      const idx = parseInt(e.target.dataset.idx, 10);
      state.chapters[idx].text = e.target.value;
      // Update the hint inline without a full re-render (preserves cursor).
      const hint = el.parentElement.querySelector('.hint');
      if (hint) hint.textContent = `${(e.target.value || '').length} chars · min 50`;
      scheduleSave();
    }));
    chList.querySelectorAll('.i-ch-remove').forEach(btn => btn.addEventListener('click', e => {
      const idx = parseInt(e.currentTarget.dataset.idx, 10);
      if (state.chapters.length <= 1) return;
      state.chapters.splice(idx, 1);
      renderChapters();
      scheduleSave();
    }));
  }
  renderChapters();

  document.getElementById('i-add-chapter').addEventListener('click', () => {
    state.chapters.push({ title: '', text: '' });
    renderChapters();
    scheduleSave();
  });

  // Top-level fields
  const titleEl = document.getElementById('i-title');
  const descEl = document.getElementById('i-desc');
  const countEl = document.getElementById('i-count');
  const endEl = document.getElementById('i-end');
  const pnameEl = document.getElementById('i-pname');
  const pbioEl = document.getElementById('i-pbio');
  const pselectEl = document.getElementById('i-pselect');
  const generateBlock = document.getElementById('i-generate-block');
  const selectBlock = document.getElementById('i-select-block');

  titleEl.value = state.title;
  descEl.value = state.description;
  countEl.value = state.chapters_to_generate;
  endEl.checked = !!state.end_story;
  pnameEl.value = state.new_profile_name;
  pbioEl.value = state.new_profile_bio;

  document.querySelectorAll('input[name="i-pmode"]').forEach(r => {
    r.checked = (r.value === state.profile_mode);
    r.addEventListener('change', () => {
      if (!r.checked) return;
      state.profile_mode = r.value;
      generateBlock.style.display = (r.value === 'generate') ? '' : 'none';
      selectBlock.style.display = (r.value === 'select') ? '' : 'none';
      if (r.value === 'select') populateProfileSelect(pselectEl, state.profile_id);
      scheduleSave();
    });
  });
  // Apply initial visibility
  generateBlock.style.display = (state.profile_mode === 'generate') ? '' : 'none';
  selectBlock.style.display = (state.profile_mode === 'select') ? '' : 'none';
  if (state.profile_mode === 'select') populateProfileSelect(pselectEl, state.profile_id);

  // Autosave wiring
  let saveTimer = null;
  function scheduleSave() {
    if (saveTimer) clearTimeout(saveTimer);
    saveTimer = setTimeout(() => _saveImportDraft(state), 500);
  }
  titleEl.addEventListener('input', e => { state.title = e.target.value; scheduleSave(); });
  descEl.addEventListener('input', e => { state.description = e.target.value; scheduleSave(); });
  countEl.addEventListener('input', e => { state.chapters_to_generate = parseInt(e.target.value, 10) || 1; scheduleSave(); });
  endEl.addEventListener('change', e => { state.end_story = e.target.checked; scheduleSave(); });
  pnameEl.addEventListener('input', e => { state.new_profile_name = e.target.value; scheduleSave(); });
  pbioEl.addEventListener('input', e => { state.new_profile_bio = e.target.value; scheduleSave(); });
  pselectEl.addEventListener('change', e => { state.profile_id = e.target.value; scheduleSave(); });

  // Submit
  document.getElementById('i-create').addEventListener('click', async () => {
    // Client-side validation
    if (!state.chapters.length) return toast('Add at least one chapter.', 'error');
    for (let i = 0; i < state.chapters.length; i++) {
      const t = state.chapters[i].text || '';
      if (t.length < 50) return toast(`Chapter ${i + 1} needs at least 50 characters.`, 'error');
    }
    if ((state.description || '').length < 20) return toast('Description must be at least 20 characters.', 'error');
    const cnt = parseInt(state.chapters_to_generate, 10);
    if (!Number.isFinite(cnt) || cnt < 1) return toast('Generate at least 1 new chapter.', 'error');
    if (state.profile_mode === 'select' && !state.profile_id) return toast('Pick a profile or switch to "generate".', 'error');
    if (state.profile_mode === 'generate' && !(state.new_profile_name || '').trim()) return toast('Enter a name for the new profile.', 'error');

    const payload = {
      title: state.title.trim() || undefined,
      chapters: state.chapters.map(c => ({
        title: (c.title || '').trim() || undefined,
        text: c.text,
      })),
      description: state.description,
      chapters_to_generate: cnt,
      end_story: !!state.end_story,
      profile_mode: state.profile_mode,
    };
    if (state.profile_mode === 'select') {
      payload.profile_id = state.profile_id;
    } else {
      payload.new_profile_name = state.new_profile_name.trim();
      if (state.new_profile_bio && state.new_profile_bio.trim()) {
        payload.new_profile_bio = state.new_profile_bio.trim();
      }
    }

    const btn = document.getElementById('i-create');
    btn.disabled = true;
    const orig = btn.textContent;
    btn.textContent = 'Building bibles...';
    try {
      toast('Parsing chapters + building bibles...');
      const r = await api('POST', '/stories/import/', payload);
      _clearImportDraft();
      toast(`Imported ${r.chapters_imported} chapter${r.chapters_imported === 1 ? '' : 's'}. Review bibles next.`, 'ok');
      window.location.hash = `#/stories/${r.story_id}/bibles`;
    } catch (e) {
      btn.disabled = false;
      btn.textContent = orig;
      toast(e.message, 'error');
    }
  });
}

// ---- Continue dialog (story detail) ------------------------
function continueDialog(storyId, story) {
  const totalCh = story.progress?.total_chapters || (story.chapters || []).length;
  const writtenCh = (story.chapters || []).length;
  const remaining = Math.max(1, totalCh - writtenCh);
  const def = Math.min(3, remaining);
  const currentProfileId = (story.quick_survey?.profile_id) || '';

  // Build a modal overlay.
  const overlay = document.createElement('div');
  overlay.id = 'continue-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(20,18,15,0.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;';
  overlay.innerHTML = `
    <div class="card" style="max-width:520px;width:100%;background:var(--bg);box-shadow:0 12px 40px rgba(0,0,0,0.2)">
      <h3 style="margin-top:0">Continue writing</h3>
      <div class="field">
        <label>How many more chapters</label>
        <input id="cd-count" type="number" min="1" max="200" value="${def}" />
        <div class="hint">Currently at chapter ${writtenCh} of ${totalCh}. Asking for more than ${remaining} will extend the total.</div>
      </div>
      <div class="field" style="display:flex;align-items:center;gap:8px">
        <input id="cd-end" type="checkbox" />
        <label for="cd-end" style="margin:0;cursor:pointer">End the story this batch (write a finale)</label>
      </div>
      <div class="field">
        <label>Profile</label>
        <select id="cd-profile"></select>
        <div id="cd-warn" class="hint" style="color:var(--accent-2);display:none;margin-top:6px">
          ⚠ Switching profiles will change the narrative voice from this batch onward. Existing chapters won't be rewritten.
        </div>
      </div>
      <div class="row" style="margin-top:14px;justify-content:flex-end">
        <button id="cd-cancel">Cancel</button>
        <button id="cd-go" class="primary">Continue writing</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);

  function close() { if (overlay.parentElement) overlay.parentElement.removeChild(overlay); }
  overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
  document.getElementById('cd-cancel').addEventListener('click', close);

  const selectEl = document.getElementById('cd-profile');
  const warnEl = document.getElementById('cd-warn');
  populateProfileSelect(selectEl, currentProfileId);
  selectEl.addEventListener('change', () => {
    warnEl.style.display = (selectEl.value && selectEl.value !== currentProfileId) ? '' : 'none';
  });

  document.getElementById('cd-go').addEventListener('click', async () => {
    const n = parseInt(document.getElementById('cd-count').value, 10);
    if (!Number.isFinite(n) || n < 1) return toast('Enter a positive number.', 'error');
    const payload = { additional_chapters: n, end_story: document.getElementById('cd-end').checked };
    if (selectEl.value && selectEl.value !== currentProfileId) payload.profile_id = selectEl.value;
    const goBtn = document.getElementById('cd-go');
    goBtn.disabled = true;
    try {
      await api('POST', `/stories/${storyId}/continue/`, payload);
      toast('Continued.', 'ok');
      close();
      pollHead(storyId);
    } catch (e) {
      goBtn.disabled = false;
      toast(e.message, 'error');
    }
  });
}

async function loadImportedChapters(storyId) {
  const card = document.getElementById('imported-card');
  const block = document.getElementById('imported-block');
  if (!card || !block) return;
  try {
    const story = await api('GET', `/stories/${storyId}/`);
    const imported = (story.chapters || []).filter(c => c.source === 'imported');
    if (!imported.length) {
      card.style.display = 'none';
      return;
    }
    card.style.display = '';
    const editable = (story.status === 'pending');
    block.innerHTML = imported.map(c => `
      <div class="card" style="background:var(--bg-2)" data-ch-idx="${c.chapter_idx}">
        <div class="row">
          <strong style="flex:1">Chapter ${c.chapter_number}: ${esc(c.title || '')}</strong>
          <span class="muted">${c.word_count || 0} words</span>
          ${editable ? `<button data-edit-imported="${c.chapter_idx}">Edit</button>` : `<span class="muted">read-only</span>`}
        </div>
        ${c.summary ? `<div class="muted" style="margin-top:6px">${esc(c.summary)}</div>` : ''}
      </div>
    `).join('');
    if (editable) {
      block.querySelectorAll('[data-edit-imported]').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.editImported, 10);
          const ch = imported.find(x => x.chapter_idx === idx);
          editImportedChapterModal(storyId, ch);
        });
      });
    }
  } catch (e) {
    card.style.display = '';
    block.innerHTML = `<div class="muted">Failed to load: ${esc(e.message)}</div>`;
  }
}

async function showStoryDetail(storyId) {

async function pollHead(storyId) {
  async function once() {
    try {
      const story = await api('GET', `/stories/${storyId}/`);
      const head = document.getElementById('story-head');
      if (!head) return; // user navigated away
      const totalCh = story.progress?.total_chapters || 0;
      const writtenCh = (story.chapters || []).length;
      head.innerHTML = `
        <div class="row" style="margin-bottom:8px">
          <h2 style="margin:0;flex:1">${esc(story.title || '(untitled)')}</h2>
          <span class="badge ${story.status}" data-tip="${esc(TOOLTIPS['status_' + (story.status || 'pending')] || '')}">${STATUS_LABELS[story.status] || story.status}</span>
        </div>
        <div class="muted">${esc(story.progress?.message || '')}</div>
        <div class="progress has-tip" data-tip="${esc(TOOLTIPS.progress_percent)}"><div class="progress-bar" style="width:${story.progress?.percent || 0}%"></div></div>
        <div class="row" style="margin-top:12px">
          ${story.status === 'pending' ? `<button class="primary" id="head-start" data-tip="Architect → Chapter Planner → scenes (draft → 5 critics → editor → humaniser) → continuity refresh.">▶ Start writing</button>` : ''}
          ${story.status === 'awaiting_continue' ? `<button class="primary" id="head-continue" data-tip="Writes the next batch of chapters from where the engine paused.">▶ Continue next batch</button>` : ''}
          ${(story.status === 'pending' || story.status === 'failed') ? `<a class="btn" href="#/stories/${esc(storyId)}/bibles">Edit bibles</a>` : ''}
          ${(writtenCh > 0 && story.status !== 'writing' && story.status !== 'architecting' && story.status !== 'planning') ? `<button id="head-cascade" data-tip="Wipe everything from chapter N onward and re-write from there. Preserves the arc plan + earlier chapters.">↺ Regenerate from chapter…</button>` : ''}
          ${!story.hidden ? `<button id="head-hide" data-tip="Soft-delete. The story stays in the database but disappears from the list.">Hide</button>` : `<button id="head-unhide">Unhide</button>`}
        </div>
      `;
      head.querySelectorAll('[data-tip]').forEach(el => el.classList.add('has-tip'));
      const startBtn = document.getElementById('head-start');
      if (startBtn) startBtn.addEventListener('click', async () => {
        try { await api('POST', `/stories/${storyId}/start/`, {}); toast('Queued.', 'ok'); pollHead(storyId); } catch (e) { toast(e.message, 'error'); }
      });
      const contBtn = document.getElementById('head-continue');
      if (contBtn) contBtn.addEventListener('click', () => continueDialog(storyId, story));
      const cascadeBtn = document.getElementById('head-cascade');
      if (cascadeBtn) cascadeBtn.addEventListener('click', () => regenFromModal(storyId, totalCh));
      const hideBtn = document.getElementById('head-hide');
      if (hideBtn) hideBtn.addEventListener('click', async () => { try { await api('POST', `/stories/${storyId}/hide/`, {}); window.location.hash = '#/stories'; } catch (e) { toast(e.message, 'error'); } });
      const unhideBtn = document.getElementById('head-unhide');
      if (unhideBtn) unhideBtn.addEventListener('click', async () => { try { await api('POST', `/stories/${storyId}/unhide/`, {}); pollHead(storyId); } catch (e) { toast(e.message, 'error'); } });

      // Live polling for running stories: every 4s
      const transient = ['pending','architecting','planning','writing','running'];
      if (transient.includes(story.status)) {
        setTimeout(() => { if (window.location.hash.includes(storyId)) pollHead(storyId); }, 4000);
      }
    } catch (e) { /* silent */ }
  }
  await once();
}

function renderLiveTab(storyId) {
  closeStream();
  const c = document.getElementById('tab-content');
  c.innerHTML = `
    <div class="row" style="margin-bottom:8px">
      <span class="dot live" id="live-dot"></span>
      <span class="muted" id="live-status">Connecting to SSE...</span>
    </div>
    <div class="events-panel">
      <div class="events-panel-head">
        <strong class="has-tip" data-tip="Server-Sent Events from the orchestrator. Every milestone in the pipeline emits one: arc.planned, chapter.planning, scene.started, scene.critique.report (×5 per scene), scene.editing, scene.humanising, scene.committed, chapter.committed, story.completed.">Live events</strong>
        <span class="spacer"></span>
        <span class="muted" style="font-size:12px">Last 200 events</span>
      </div>
      <div class="events-list" id="events"></div>
    </div>
    <div class="muted" style="margin-top:10px">SSE auto-reconnects on disconnect. Replay catches up via <code>?after_seq=N</code>. Heartbeat every 15s.</div>
  `;
  const evList = document.getElementById('events');
  const evStatus = document.getElementById('live-status');
  let lastSeq = 0;
  const es = new EventSource(`${API}/stories/${storyId}/stream/?after_seq=0`);
  activeEventSource = es;
  es.onopen = () => { evStatus.textContent = 'Connected. Streaming events...'; };
  es.onerror = () => { evStatus.textContent = 'Disconnected (will retry).'; };
  function addEvent(typ, payload, seq, ts) {
    const item = document.createElement('div');
    item.className = 'event';
    item.innerHTML = `<span class="ts">${esc((ts || '').slice(11, 19))}</span><span class="type">${esc(typ)}</span><span class="payload">${esc(JSON.stringify(payload).slice(0, 240))}</span>`;
    evList.appendChild(item);
    while (evList.children.length > 200) evList.removeChild(evList.firstChild);
    evList.scrollTop = evList.scrollHeight;
    if (typ === 'chapter.committed' || typ === 'story.completed') {
      // Refresh reader tab when chapters land — but only if user has it open
    }
  }
  es.onmessage = (ev) => {
    try {
      const data = JSON.parse(ev.data);
      lastSeq = data.seq || lastSeq;
      addEvent(data.event_type || ev.type || 'message', data.payload || data, data.seq, data.ts);
    } catch { addEvent(ev.type || 'message', ev.data, null, null); }
  };
  // Listen for specific event types as well (SSE multiplexes by `event:` field)
  ['story.queued','arc.planned','chapter.planning','chapter.planned','scene.started','scene.drafted','scene.critique.report','scene.editing','scene.humanising','scene.committed','chapter.committed','story.batch_done','story.completed','story.failed','provider.throttled'].forEach(name => {
    es.addEventListener(name, (ev) => {
      try {
        const data = JSON.parse(ev.data);
        lastSeq = data.seq || lastSeq;
        addEvent(name, data.payload || data, data.seq, data.ts);
      } catch {}
    });
  });
}

      <div class="card" style="margin-bottom:8px">
        <h3>Chapter ${b.chapter_idx + 1}: ${esc(b.chapter_title || '')}</h3>
        <div class="muted">${esc(b.chapter_summary || '')}</div>
        <div style="margin-top:6px"><strong>Opening:</strong> ${esc(b.opening_hook || '—')}</div>

function regenSceneModal(storyId, chapter_idx, scene_idx) {
  openModal(`
    <h3>Regenerate scene ${chapter_idx + 1}.${scene_idx + 1}</h3>
    <div class="muted">This redrafts only this scene. Continuity downstream (later scenes' mood histories) is left alone. Use <strong>Regenerate from here</strong> on the Story page if you want a full cascade.</div>
    <div class="field" style="margin-top:10px">
      <label>Notes for the writer (optional)<span class="tip-icon" data-tip="Free-form steering. Appended to the scene beat under [USER NOTES]. The writer treats these as instructions on top of the existing beat.">?</span></label>
      <textarea id="r-notes" class="tall" placeholder="Make Mara colder. She suspects Sam is lying about the well. Open mid-conversation, no establishing paragraph. Cut the sensory detail about coal smoke (already used in chapter 2). End on the moment she puts the kit down without saying goodbye."></textarea>
      <div class="hint">Be specific about what to change. Tone, character beats, sensory anchors, pacing.</div>
    </div>
    <div class="row" style="margin-top:14px"><button id="m-save" class="primary">Regenerate</button><button id="m-cancel">Cancel</button></div>
  `, async () => {
    try {
      toast('Regenerating...');
      await api('POST', `/stories/${storyId}/regenerate-scene/`, { chapter_idx, scene_idx, user_notes: document.getElementById('r-notes').value || undefined });
      toast('Scene regenerated.', 'ok');
      closeModal();
      showStoryDetail(storyId);
    } catch (e) { toast(e.message, 'error'); }
  });
}

function regenFromModal(storyId, totalChapters) {
  openModal(`
    <h3>Regenerate from chapter…</h3>
    <div class="muted">Wipes all scenes + beat sheets + mood-history entries from this point forward, then re-launches the orchestrator. The arc plan is preserved. Earlier chapters are kept.</div>
    <div class="field" style="margin-top:12px">
      <label>Restart from chapter<span class="tip-icon" data-tip="The 1-indexed chapter number where regeneration begins. Everything from this chapter onward is replaced.">?</span></label>
      <input id="rf-ch" type="number" min="1" max="${totalChapters}" placeholder="e.g. 5" />
      <div class="hint">Existing chapter 1 through (N-1) are kept verbatim. Chapter N onward gets re-written.</div>
    </div>
    <div class="field">
      <label>Start at scene (within that chapter)<span class="tip-icon" data-tip="Optional. Defaults to 0 (start of the chapter). Set to N to keep scenes 0..N-1 inside that chapter and only rewrite from scene N onward.">?</span></label>
      <input id="rf-sc" type="number" min="0" placeholder="0" value="0" />
      <div class="hint">Leave at 0 to rewrite the whole chapter from the top.</div>
    </div>
    <div class="row" style="margin-top:14px"><button id="m-save" class="danger">Wipe & regenerate</button><button id="m-cancel">Cancel</button></div>
  `, async () => {
    const chN = parseInt(document.getElementById('rf-ch').value, 10);
    const scN = parseInt(document.getElementById('rf-sc').value || '0', 10);
    if (!Number.isFinite(chN) || chN < 1 || chN > totalChapters) {
      return toast(`Chapter must be between 1 and ${totalChapters}.`, 'error');
    }
    try {
      await api('POST', `/stories/${storyId}/regenerate-from/`, { chapter_idx: chN - 1, scene_idx: scN });
      toast('Cascade regenerate queued.', 'ok');
      closeModal();
      showStoryDetail(storyId);
    } catch (e) { toast(e.message, 'error'); }
  });
}

        <div class="hint">Saved as the canonical final prose. The previous draft is preserved in <code>draft_history</code> so you can roll back via the API.</div>
      </div>
      <div class="row" style="margin-top:14px"><button id="m-save" class="primary">Save</button><button id="m-cancel">Cancel</button></div>
    `, async () => {
      try {
        await api('PATCH', `/stories/${storyId}/scenes/${chapter_idx}/${scene_idx}/`, { prose: document.getElementById('e-prose').value, run_humaniser: true });
        toast('Saved.', 'ok');
        closeModal();
        showStoryDetail(storyId);
      } catch (e) { toast(e.message, 'error'); }
    });
  });
}

async function showProfilesList() {
  setActiveNav('profiles');
  app.innerHTML = `
    <div class="row" style="margin-bottom:18px">
      <h2 style="flex:1;margin:0">Author profiles</h2>
      <a class="btn primary" href="#/profiles/new">+ New profile</a>
    </div>
    <div id="profiles" class="stack"></div>
  `;
  const wrap = document.getElementById('profiles');
  wrap.innerHTML = '<div class="muted">Loading...</div>';
  try {
    const data = await api('GET', '/profiles/');
    const profiles = data.profiles || [];
    if (!profiles.length) {
      wrap.innerHTML = '<div class="card"><div class="muted">No profiles yet. Profiles are reusable author voices — create one and any story can use it.</div></div>';
      return;
    }
    wrap.innerHTML = profiles.map(p => `
      <a class="card clickable" href="#/profiles/${esc(p.mongo_id || p.profile_id)}">
        <div class="row">
          <strong style="flex:1">${esc(p.name)}</strong>
          <span class="muted">${fmtDate(p.created_at)}</span>
        </div>
        <div class="muted">${esc((p.expertise_tags || []).join(', ') || '—')}</div>
      </a>
    `).join('');
  } catch (e) {
    wrap.innerHTML = `<div class="card">Failed to load: ${esc(e.message)}</div>`;
  }
}

    <h2>Create author profile</h2>

    <div class="card">
      <div class="field">
        <label>Name *${tip('profileName')}</label>

      </div>
      <div class="field">

      <div class="field-row">

          <label>Background${tip('profileBg')}</label>

        </div>
        <div class="field">
          <label>Personality${tip('profilePers')}</label>
          <textarea id="p-pers" placeholder="Stubborn. Observational. Suspicious of metaphor."></textarea>
          <div class="hint">Affects emotional defaults — humor type, interiority density, vulnerability handling.</div>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Communication style${tip('profileComm')}</label>
          <textarea id="p-comm" placeholder="Direct. Quiet. Withholds praise. Says things once."></textarea>

      <div class="field">
        <label>Interests and values${tip('profileInt')}</label>

      </div>
      <div class="field">
        <label>Writing samples${tip('profileSamples')}</label>
        <textarea id="p-samples" class="xtall" placeholder="The first storm came on a Tuesday. By Wednesday the rail line was gone and Mara had set three bones in a kitchen by lamplight. The Polish boy with the crushed foot. The Irishwoman with the dislocated shoulder. The mortician's youngest, who had walked his sled into a juniper trunk because the snow had erased the path. She did them in that order. The Polish boy first because he was screaming.&#10;&#10;She did not say what she had come to say. Instead she watched her mother stir something with one wooden spoon and gesture at the cupboard with the other, eyebrows asking a question she didn't need to answer out loud. Bowls. Yes. She got up and got the bowls down. The smaller ones, because her mother's hands had gotten tired this year, and the smaller ones were lighter. The radio kept talking. The garlic kept browning. Mira set the table for two and lost her nerve completely."></textarea>
        <div class="hint">2-4 passages, separate with a blank line. The single highest-leverage profile field — the Profiler derives lexical statistics directly from these.</div>
      </div>
      <div class="field">
        <label>Expertise tags${tip('profileTags')}</label>

/* ============================================================
 * Modal helper
 * ============================================================ */

function openModal(html, onSave) {
  const back = document.createElement('div');
  back.className = 'modal-backdrop';
  back.id = 'modal-backdrop';
  back.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(back);
  const save = back.querySelector('#m-save');
  const cancel = back.querySelector('#m-cancel');
  if (save && onSave) save.addEventListener('click', onSave);
  if (cancel) cancel.addEventListener('click', closeModal);
  back.addEventListener('click', (e) => { if (e.target === back) closeModal(); });
}
function closeModal() {
  const back = document.getElementById('modal-backdrop');
  if (back) back.remove();
}
